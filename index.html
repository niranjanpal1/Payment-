<!DOCTYPE html>
<html>
<head>
  <title>Secure Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    body { font-family: Arial; margin: 0; background: #0f172a; color: white; padding: 20px; }
    .card { background: #1e293b; padding: 25px; border-radius: 16px; max-width: 400px; margin: 30px auto; }
    input { width: 100%; padding: 14px; margin: 10px 0; background: #334155; border: 1px solid #475569; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 16px; background: #5f259f; border: none; color: white; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .upi-btn { background: #00baf2; }
    .wa-btn { background: #25D366; }
    h2 { text-align: center; margin: 0 0 15px 0; }
    .note { font-size: 13px; opacity: 0.8; text-align: center; margin-top: 20px; line-height: 1.5; }
    #qrcode { background: white; padding: 15px; border-radius: 8px; margin: 15px auto; width: fit-content; display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2>💰 Secure Payment</h2>
  <input type="text" id="name" placeholder="Tor Naam" required>
  <input type="number" id="amount" placeholder="Amount ₹" value="99" required>
  <input type="text" id="item" placeholder="Kiser Jonno?" required>
  
  <button class="upi-btn" onclick="payNow()">UPI App diye Pay Kor</button>
  <button class="wa-btn" onclick="payWhatsApp()">WhatsApp Pay diye Pay</button>
  <button onclick="showQR()">QR Code Dekhao</button>
  <div id="qrcode"></div>
  
  <button onclick="sendWhatsApp()">Payment Done - WhatsApp a Janao</button>
  
  <p class="note">
    100% Secure UPI Payment<br>
    Button kaj na korle QR scan korun
  </p>
</div>

<script>
  const UPI_ID = "917363872892@waaxis";
  const MERCHANT_NAME = "Niranjan Pal";

  function getUPILink() {
    let amount = document.getElementById('amount').value;
    let name = document.getElementById('name').value;
    if(!amount || amount < 1) { alert('Amount de bhai'); return null; }
    if(!name) { alert('Naam ta likhe de'); return null; }
    return `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=INR&tn=Payment from ${encodeURIComponent(name)}`;
  }

  function payNow() {
    let upiLink = getUPILink();
    if(upiLink) {
      window.location.href = upiLink;
    }
  }

  function payWhatsApp() {
    let amount = document.getElementById('amount').value;
    if(!amount || amount < 1) { alert('Amount de bhai'); return; }
    let waLink = `https://wa.me/917363872892?text=Hi, I want to pay ₹${amount}`;
    window.open(waLink, '_blank');
  }

  function showQR() {
    let upiLink = getUPILink();
    if(upiLink) {
      document.getElementById('qrcode').style.display = 'block';
      document.getElementById('qrcode').innerHTML = '';
      QRCode.toCanvas(upiLink, { width: 200 }, function (err, canvas) {
        if (err) console.error(err);
        document.getElementById('qrcode').appendChild(canvas);
      });
    }
  }

  function sendWhatsApp() {
    let name = document.getElementById('name').value;
    let amount = document.getElementById('amount').value;
    let item = document.getElementById('item').value;
    if(!name || !amount) { alert('Naam ar Amount de agey'); return; }
    let phoneNumber = "917363872892"; // Tor WhatsApp Number
    let message = `Payment Done ✅%0AName: ${name}%0AAmount: ₹${amount}%0AFor: ${item}%0APlease confirm.`;
    window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
  }
</script>

</body>
</html>
