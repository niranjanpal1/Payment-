<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyByujwHczgYY6QzQdrKDgisixTzkAMP-pg",
    authDomain: "iranjanpal-social.firebaseapp.com",
    databaseURL: "https://iranjanpal-social-default-rtdb.firebaseio.com",
    projectId: "iranjanpal-social",
    storageBucket: "iranjanpal-social.firebasestorage.app",
    messagingSenderId: "620301811783",
    appId: "1:620301811783:web:55c024199f99dddccd3162"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const postBtn = document.getElementById('postBtn');
  const postInput = document.getElementById('postInput');
  const feedDiv = document.getElementById('feed');

  // User login ache kina check kor
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Login kora ache
      const userName = user.displayName;
      const userPhoto = user.photoURL;

      // Post Button er kaaj
      postBtn.addEventListener('click', () => {
        const text = postInput.value.trim();
        if (text === '') return;
        
        push(ref(db, 'posts/'), {
          name: userName,
          photo: userPhoto,
          text: text,
          time: Date.now(),
          uid: user.uid
        });
        postInput.value = '';
      });

    } else {
      // Login kora nei, login page a patha
      window.location.href = 'login.html';
    }
  });

  // Post Load Kora
  onValue(ref(db, 'posts/'), (snapshot) => {
    feedDiv.innerHTML = '';
    const posts = snapshot.val();
    if (posts) {
      Object.keys(posts).reverse().forEach(key => {
        const post = posts[key];
        feedDiv.innerHTML += `
          <div class="post">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
              <img src="${post.photo}" style="width:40px; height:40px; border-radius:50%;">
              <b>${post.name}</b>
            </div>
            <p>${post.text}</p>
            <small>${new Date(post.time).toLocaleString('en-IN')}</small>
          </div>
        `;
      });
    }
  });
</script>
